<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
  .container {
    display: flex;
    gap: 20px;
    justify-content: center;
  }

  .grafico {
    width: 400px;
    height: 300px;
  }
</style>

  <title>Gráficos com ChartJS</title>
</head>

<body>

  <div class="container">
  <div class="grafico">
    <canvas id="chartLinha"></canvas>
  </div>

  <div class="grafico">
    <canvas id="chartBarra"></canvas>
  </div>
</div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    const ctxLinha = document.getElementById('chartLinha');
    const ctxBarra = document.getElementById('chartBarra');

    new Chart(ctxBarra, {
      type: 'bar',
      data: {
        labels: ['janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'],
        datasets: [{
          label: 'Temperatura Média',
          data: [22, 24, 27, 23, 20, 18],
          borderWidth: 1,
          backgroundColor: 'red'
        },
        {
          label: 'Umidade Média',
          data: [90, 89, 93, 87, 88, 82],
          borderWidth: 1,
          backgroundColor: 'rgba(54, 162, 235, 1)'
        }]
      },
      options: {
  responsive: true,
  maintainAspectRatio: false,
  scales: {
    y: {
      beginAtZero: true
    }
  }
}
    });

    new Chart(ctxLinha, {
      type: 'line',
      data: {
        labels: ['12:00', '13:00', '14:00', '15:00', '16:00', '17:00'],
        datasets: [{
          label: 'Temperatura',
          data: [30, 29, 28, 25, 22, 23],
          borderColor: 'red',
          backgroundColor: 'red'
        },
        {
          label: 'Umidade',
          data: [80, 82, 80, 85, 80, 83],
          borderColor: 'rgba(54, 162, 235, 1)',
          backgroundColor: 'rgba(54, 162, 235, 1)'
        }]
      },
      options: {
  responsive: true,
  maintainAspectRatio: false,
  scales: {
    y: {
      beginAtZero: true
    }
  }
}
    });

  </script>

</body>

</html>
